name: Upload Video to Streamable
on:
  issues:
    types: [opened]

jobs:
  upload:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'video-upload')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # ←【ここを修正しました】node-node-version になっていたバグを直しました

      - name: Process Video and Upload
        env:
          STREAMABLE_EMAIL: ${{ secrets.STREAMABLE_EMAIL }}
          STREAMABLE_PASSWORD: ${{ secrets.STREAMABLE_PASSWORD }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # 1. HTMLから送られてきたBase64動画データを抽出して動画ファイルに復元
          echo "$ISSUE_BODY" | sed -n 's/.*<!-- VIDEO_DATA_START -->\(.*\)<!-- VIDEO_DATA_END -->.*/\1/p' | sed 's/^data:video\/[^;]*;base64,//' | base64 -d > video.mp4

          # 2. Streamable APIを使って動画ファイルをアップロード
          RESPONSE=$(curl -u "$STREAMABLE_EMAIL:$STREAMABLE_PASSWORD" \
            -F "file=@video.mp4" \
            -F "title=$ISSUE_TITLE" \
            https://streamable.com)
          
          # 3. 返ってきたデータから動画の「識別コード（shortcode）」を取り出す
          SHORTCODE=$(echo $RESPONSE | jq -r '.shortcode')
          
          if [ "$SHORTCODE" = "null" ] || [ -z "$SHORTCODE" ]; then
            echo "Streamableへのアップロードに失敗しました。"
            exit 1
          fi

          # 4. videos.json を更新するスクリプト（Node.js）を実行
          node -e "
            const fs = require('fs');
            const file = './videos.json';
            const data = fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf8')) : [];
            
            data.unshift({
              title: process.env.ISSUE_TITLE,
              streamable_url: 'https://streamable.com' + '$SHORTCODE',
              date: new Date().toISOString().split('T')[0]
            });
            
            fs.writeFileSync(file, JSON.stringify(data, null, 2));
          "

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add videos.json
          git commit -m "Add new video: ${{ github.event.issue.title }}"
          git push

      - name: Close Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            })
