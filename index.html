<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>GitHub内完結 動画サイト</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .upload-box { border: 2px dashed #ccc; padding: 20px; margin-bottom: 30px; background: #f9f9f9; border-radius: 8px; }
        .video-card { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        iframe { width: 100%; max-width: 640px; height: 360px; border: none; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #0056b3; }
        #status { font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1>動画を投稿する</h1>
    <div class="upload-box">
        <input type="text" id="video-title" placeholder="動画のタイトルを入力">
        <input type="file" id="video-file" accept="video/*">
        <button onclick="uploadVideo()">動画を投稿する</button>
        <p id="status"></p>
    </div>

    <h1>動画一覧</h1>
    <div id="video-list"></div>

    <script>
        // ⚠️【最重要】ここをご自身の情報に正しく書き換えてください！
        const GITHUB_TOKEN = "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"; 
        const REPO_OWNER = "Takasu1220";
        const REPO_NAME = "videojoiner";

        async function uploadVideo() {
            const titleInput = document.getElementById('video-title');
            const fileInput = document.getElementById('video-file');
            const status = document.getElementById('status');

            if (!titleInput.value || !fileInput.files || fileInput.files.length === 0) {
                alert('タイトルと動画ファイルを選択してください。');
                return;
            }

            status.innerText = "動画データを変換中...（少々お待ちください）";
            const file = fileInput.files[0];

            // 動画ファイルをテキスト（Base64）に変換
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async function () {
                const base64Data = reader.result;

                status.innerText = "GitHubへリクエストを直接送信中...";

                try {
                    // GitHubの「Issues」に自動投稿するリクエスト
                    const response = await fetch(`https://github.com{REPO_OWNER}/${REPO_NAME}/issues`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${GITHUB_TOKEN}`, // 'token' から 'Bearer' に変更して通信を確実にしました
                            'Accept': 'application/vnd.github+json',
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            title: titleInput.value,
                            body: `<!-- VIDEO_DATA_START -->${base64Data}<!-- VIDEO_DATA_END -->`,
                            labels: ['video-upload'] // このラベルがActionsを起動するトリガーになります
                        })
                    });

                    const resData = await response.json();

                    if (response.ok) {
                        status.innerHTML = "<span style='color:green;'>送信成功！裏方ロボットが起動しました。<br>約2〜3分後に動画一覧に反映されます。</span>";
                        titleInput.value = "";
                        fileInput.value = "";
                    } else {
                        // エラーが起きた場合は原因を画面に表示する
                        status.innerHTML = `<span style='color:red;'>エラー発生: ${resData.message || response.statusText} (コード: ${response.status})</span>`;
                    }
                } catch (error) {
                    status.innerHTML = `<span style='color:red;'>通信に失敗しました: ${error.message}</span>`;
                }
            };

            reader.onerror = function() {
                status.innerHTML = "<span style='color:red;'>ファイルの読み込みに失敗しました。</span>";
            };
        }

        // 動画一覧を表示する処理
        fetch('./videos.json?t=' + new Date().getTime()) // キャッシュを防ぐ設定を追加
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('video-list');
                if (data.length === 0) {
                    container.innerText = "動画がまだありません。最初の動画を投稿してください！";
                    return;
                }
                data.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <h3>${video.title}</h3>
                        <iframe src="${video.streamable_url}" allowfullscreen></iframe>
                    `;
                    container.appendChild(card);
                });
            }).catch(() => {
                document.getElementById('video-list').innerText = "動画データの読み込みに失敗しました。";
            });
    </script>
</body>
</html>
